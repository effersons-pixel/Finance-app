<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Marilu Family Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0f0e17;--paper:#faf9f6;--card:#ffffff;
  --gold:#c8813a;--gold-lt:#fff3e0;--gold-dk:#a0622b;
  --green:#3d7a5a;--green-lt:#e8f5ee;
  --red:#c0392b;--red-lt:#fdecea;
  --muted:#8a8a9a;--border:#e8e6e0;--soft:#f5f3ef;
  --sidebar-w:230px;--bottomnav-h:66px;
  --k1:#e86339;--k1-lt:#fff1ec;
  --k2:#2563eb;--k2-lt:#eff6ff;
}
html{height:100%}
body{height:100%;font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}
.shell{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--ink);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sidebar::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 15% 85%,rgba(200,129,58,.2) 0%,transparent 55%)}
.brand{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;color:#fff;line-height:1.2}
.brand-name em{color:var(--gold);font-style:italic}
.brand-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:3px;letter-spacing:1px;text-transform:uppercase}
nav{padding:8px 0;flex:1;overflow-y:auto}
.nav-sec{padding:10px 22px 3px;font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.2);font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 22px;cursor:pointer;color:rgba(255,255,255,.45);font-size:13.5px;font-weight:500;border-left:3px solid transparent;transition:all .16s}
.nav-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.nav-item.active{color:#fff;border-left-color:var(--gold);background:rgba(200,129,58,.11)}
.nav-item.kids-nav.active{border-left-color:#f97316;background:rgba(249,115,22,.12)}
.nav-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px}
.sidebar-foot{padding:13px 22px;border-top:1px solid rgba(255,255,255,.08)}
.sync-row{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.38);margin-bottom:4px}
.dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0}
.dot.on{background:#4ade80;box-shadow:0 0 5px #4ade8066}
.sync-file{font-size:10px;color:rgba(255,255,255,.22);word-break:break-all}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:13px 24px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.04);z-index:10}
.page-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;flex:1}
.topbar-right{display:flex;align-items:center;gap:9px;flex-wrap:nowrap}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 24px 32px}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}

/* BOTTOM NAV */
.bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav-h);background:var(--ink);border-top:1px solid rgba(255,255,255,.08);z-index:100}
.bn-items{display:flex;height:100%}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:rgba(255,255,255,.38);font-size:10px;font-weight:500;transition:color .15s;position:relative}
.bn-item.active{color:var(--gold)}
.bn-item.kids-nav.active{color:#f97316}
.bn-icon{font-size:18px;line-height:1}
.bn-badge{position:absolute;top:5px;right:calc(50% - 18px);background:var(--gold);color:#fff;font-size:9px;font-weight:700;padding:0 4px;border-radius:99px;min-width:15px;text-align:center}

/* PANELS */
.panel{display:none;animation:fadeUp .22s ease}
.panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* TABLES - RESPONSIVE FIX */
.tbl-wrap{background:var(--card);border-radius:13px;border:1px solid var(--border);overflow-x:auto;box-shadow:0 1px 10px rgba(0,0,0,.04);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:600px} /* Min-width forces scroll instead of squashing */
th{padding:11px 14px;font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);background:var(--soft);font-weight:600;text-align:left;white-space:nowrap}
td{padding:11px 14px;border-top:1px solid var(--border);font-size:13px;vertical-align:middle}

/* REST OF YOUR STYLES UNCHANGED... */
.btn{padding:9px 18px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--gold);color:#fff}.btn-primary:hover{background:var(--gold-dk)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--ink)}.btn-ghost:hover{background:var(--soft)}
.btn-sm{padding:7px 14px;font-size:12.5px}
.btn-red{background:var(--red);color:#fff}
.btn-kids{background:#f97316;color:#fff}.btn-kids:hover{background:#ea6c0c}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chips{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:1px}
.chip{padding:5px 13px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;transition:all .14s;flex-shrink:0}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
.stat{background:var(--card);border-radius:13px;padding:17px 18px;border:1px solid var(--border);box-shadow:0 1px 10px rgba(0,0,0,.04)}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:6px}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;line-height:1;letter-spacing:-.3px}
.pos{color:var(--green)}.neg{color:var(--red)}.gold{color:var(--gold)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--card);border-radius:13px;border:1px solid var(--border);padding:19px 21px;box-shadow:0 1px 10px rgba(0,0,0,.04)}
.card-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:600;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:9px;height:120px;margin-bottom:10px}
.bg{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bp{display:flex;gap:3px;align-items:flex-end;height:100px}
.b{border-radius:4px 4px 0 0;min-height:3px;cursor:default;transition:opacity .15s}
.b.gi{background:var(--green);width:13px}.b.ge{background:var(--red);width:13px}
.cat-list{display:flex;flex-direction:column;gap:9px}
.cat-r{display:flex;align-items:center;gap:9px}
.cat-n{font-size:12px;width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-tr{flex:1;background:var(--soft);border-radius:99px;height:6px}
.cat-fl{height:100%;border-radius:99px;background:var(--gold)}
.cat-a{font-size:12px;font-weight:600;color:var(--muted);min-width:70px;text-align:right}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.b-income{background:var(--green-lt);color:var(--green)}.b-expense{background:var(--red-lt);color:var(--red)}
.amt-p{color:var(--green);font-weight:600}.amt-n{color:var(--red);font-weight:600}
.form-wrap{max-width:560px}
.ai-box{background:linear-gradient(135deg,#fffbf4,#f0f9f4);border:1.5px solid #e8d5b8;border-radius:12px;padding:17px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
input,select,textarea{padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);background:var(--paper);outline:none;width:100%}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;animation:slideUp .22s ease}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:99px;font-size:13.5px;z-index:999;opacity:0;transition:all .25s ease}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-10px)}

@media(max-width:700px){
  .sidebar{display:none}
  .bottomnav{display:block}
  .content{padding:14px 14px 80px}
  .stats{grid-template-columns:1fr 1fr;gap:10px}
  .two-col{grid-template-columns:1fr}
  .page-title{font-size:17px}
}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-name">Marilu<br><em>Family</em></div>
    <div class="brand-sub">Finance · 2025</div>
  </div>
  <nav>
    <div class="nav-sec">Finance</div>
    <div class="nav-item active" onclick="go('dashboard')"><span class="nav-icon">◈</span>Dashboard</div>
    <div class="nav-item" onclick="go('add')"><span class="nav-icon">＋</span>Add Transaction</div>
    <div class="nav-item" onclick="go('ledger')"><span class="nav-icon">≡</span>Ledger<span class="nav-badge" id="nb">0</span></div>
    <div class="nav-item" onclick="go('budget')"><span class="nav-icon">◎</span>Budget</div>
    <div class="nav-sec">Children</div>
    <div class="nav-item nav-kids" onclick="go('kids')"><span class="nav-icon">👨‍👩‍👧‍👦</span>Kids Tracker</div>
    <div class="nav-sec">System</div>
    <div class="nav-item" onclick="go('drive')"><span class="nav-icon">☁</span>Google Drive</div>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <div class="page-title" id="pageTitle">Dashboard</div>
    <div class="topbar-right"><button class="btn btn-primary btn-sm" onclick="go('add')">+ Add</button></div>
  </div>
  <div class="content">
    <div class="panel active" id="panel-dashboard">
      <div class="stats" id="statsRow"></div>
      <div class="two-col">
        <div class="card"><div class="card-title">Monthly Overview</div><div class="bar-chart" id="barChart"></div></div>
        <div class="card"><div class="card-title">Top Expenses</div><div class="cat-list" id="catChart"></div></div>
      </div>
      <div class="tbl-wrap">
        <table id="recentTable"><thead><tr><th>Date</th><th>Type</th><th>Category</th><th style="text-align:right">Amount</th></tr></thead><tbody id="recentTbody"></tbody></table>
      </div>
    </div>
    <div class="panel" id="panel-ledger">
      <div class="tbl-wrap">
        <table><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Description</th><th style="text-align:right">Amount</th><th style="text-align:right">Balance</th><th></th></tr></thead><tbody id="ledgerTbody"></tbody></table>
      </div>
    </div>
    <div class="panel" id="panel-drive">
      <div class="card" style="max-width:500px">
        <h3>Drive Sync</h3>
        <input id="gApiKey" placeholder="Google API Key" type="text" style="margin:10px 0">
        <input id="gClientId" placeholder="OAuth Client ID" type="text" style="margin:10px 0">
        <button class="btn btn-primary" onclick="initDrive()">Connect Drive</button>
        <div style="margin-top:20px">
          <button class="btn btn-ghost" onclick="driveSave()">💾 Save</button>
          <button class="btn btn-ghost" onclick="driveLoad()">📂 Load</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<nav class="bottomnav">
  <div class="bn-items">
    <div class="bn-item active" onclick="go('dashboard')">◈ Home</div>
    <div class="bn-item" onclick="go('add')">＋ Add</div>
    <div class="bn-item" onclick="go('ledger')">≡ Ledger</div>
    <div class="bn-item" onclick="go('kids')">👨‍👩‍👧 Kids</div>
    <div class="bn-item" onclick="go('drive')">☁ Drive</div>
  </div>
</nav>

<script>
// Logic core
let txs = JSON.parse(localStorage.getItem('mf_txs') || '[]');
let gReady = false; let gFileId = null;

const save = () => localStorage.setItem('mf_txs', JSON.stringify(txs));
const ksh = n => 'KSh ' + Math.abs(n).toLocaleString();

function go(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  if(id === 'dashboard') renderDashboard();
  if(id === 'ledger') renderLedger();
}

function renderDashboard() {
  const inc = txs.filter(t => t.type === 'Income').reduce((s, t) => s + t.amt, 0);
  const exp = txs.filter(t => t.type === 'Expense').reduce((s, t) => s + t.amt, 0);
  document.getElementById('statsRow').innerHTML = `
    <div class="stat"><div class="stat-lbl">Income</div><div class="stat-val pos">${ksh(inc)}</div></div>
    <div class="stat"><div class="stat-lbl">Expenses</div><div class="stat-val neg">${ksh(exp)}</div></div>
  `;
}

function renderLedger() {
  document.getElementById('ledgerTbody').innerHTML = txs.map(t => `
    <tr><td>${t.date}</td><td>${t.type}</td><td>${t.cat}</td><td>${t.desc}</td><td style="text-align:right">${ksh(t.amt)}</td><td>-</td><td>×</td></tr>
  `).join('');
}

// DRIVE FIXES
function initDrive() {
  const ak = document.getElementById('gApiKey').value.trim();
  const ck = document.getElementById('gClientId').value.trim();
  localStorage.setItem('mf_gak', ak); localStorage.setItem('mf_gck', ck);
  
  const loadScript = (src, cb) => { const s = document.createElement('script'); s.src = src; s.onload = cb; document.head.appendChild(s); };
  loadScript('https://accounts.google.com/gsi/client', () => {
    loadScript('https://apis.google.com/js/api.js', () => {
      gapi.load('client', async () => {
        await gapi.client.init({ apiKey: ak, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
        gReady = true; alert('Connected!');
      });
    });
  });
}

function getToken(cb) {
  // FIXED: Pulling Client ID directly from localStorage to ensure it's present
  const clientID = localStorage.getItem('mf_gck');
  if(!clientID) { alert("Missing Client ID"); return; }
  
  google.accounts.oauth2.initTokenClient({
    client_id: clientID,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: cb
  }).requestAccessToken();
}

async function driveSave() {
  if(!gReady) return alert("Connect Drive first");
  getToken(async tok => {
    const content = JSON.stringify(txs);
    const b = 'mf_bound';
    const meta = JSON.stringify({name: 'marilu_finance.json', mimeType: 'application/json'});
    const body = `--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${content}\r\n--${b}--`;
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + tok.access_token, 'Content-Type': `multipart/related; boundary=${b}` },
      body: body
    });
    alert("Saved!");
  });
}

window.onload = () => {
  renderDashboard();
  document.getElementById('gApiKey').value = localStorage.getItem('mf_gak') || '';
  document.getElementById('gClientId').value = localStorage.getItem('mf_gck') || '';
};
</script>
</body>
</html>
